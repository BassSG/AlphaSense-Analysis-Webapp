<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, 
          maximum-scale=1.0, user-scalable=no">
    <title>APS Trading</title>

    <link rel="icon" type="image/webp" 
      href="https://s21-kling.klingai.com/kimg/EMXN1y8qeAoGdXBsb2FkEg55bGFiLXN0dW50LXNncBpec2UvYWlfcG9ydGFsX3NncF9tbXVfaW1nMmltZ19haXdlYl92MTVfcG9ydHJhaXQvZjU4NDhmMzQtNjJiYi00OWNiLTljOGEtZmM1M2Y1OGU3OTUyX2ltYWdlLnBuZw:360x360.webp?x-kcdn-pid=112372">
    <link rel="apple-touch-icon" 
      href="https://s21-kling.klingai.com/kimg/EMXN1y8qeAoGdXBsb2FkEg55bGFiLXN0dW50LXNncBpec2UvYWlfcG9ydGFsX3NncF9tbXVfaW1nMmltZ19haXdlYl92MTVfcG9ydHJhaXQvZjU4NDhmMzQtNjJiYi00OWNiLTljOGEtZmM1M2Y1OGU3OTUyX2ltYWdlLnBuZw:360x360.webp?x-kcdn-pid=112372">
    <link rel="manifest" href="manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="APS Trading">
    <meta name="theme-color" content="#08111f">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background:
                radial-gradient(circle at 20% 20%, rgba(59,130,246,.15), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(34,211,238,.10), transparent 40%),
                linear-gradient(180deg, #07101d 0%, #0b1524 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        /* ── Splash Container ── */
        .splash {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            animation: fadeIn 0.6s cubic-bezier(.4,0,.2,1);
            padding: 20px;
        }

        @keyframes fadeIn {
            from { opacity:0; transform:translateY(20px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* ── Logo ── */
        .logo-wrap {
            position: relative;
            width: 110px;
            height: 110px;
        }

        /* วงแหวนหมุนรอบ logo */
        .logo-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            animation: spin 3s linear infinite;
        }

        .logo-ring svg {
            width: 100%;
            height: 100%;
        }

        .logo-ring .r-track {
            fill: none;
            stroke: rgba(255,255,255,.06);
            stroke-width: 2;
        }

        .logo-ring .r-fill {
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-dasharray: 200;
            stroke-dashoffset: 140;
            stroke: url(#ringGrad);
            filter: drop-shadow(0 0 4px rgba(59,130,246,.8));
        }

        .logo {
            position: absolute;
            inset: 0;
            border-radius: 28px;
            background: linear-gradient(135deg, #1d4ed8, #0ea5e9, #22d3ee);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            font-weight: 900;
            color: #fff;
            letter-spacing: -1px;
            box-shadow:
                0 0 0 1px rgba(59,130,246,.4),
                0 20px 60px rgba(59,130,246,.5),
                inset 0 1px 0 rgba(255,255,255,.2);
            animation: logoPulse 2.5s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%,100% {
                box-shadow:
                    0 0 0 1px rgba(59,130,246,.4),
                    0 20px 60px rgba(59,130,246,.4),
                    inset 0 1px 0 rgba(255,255,255,.2);
            }
            50% {
                box-shadow:
                    0 0 0 1px rgba(59,130,246,.6),
                    0 20px 80px rgba(59,130,246,.7),
                    0 0 120px rgba(34,211,238,.25),
                    inset 0 1px 0 rgba(255,255,255,.2);
            }
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── App Name ── */
        .title { text-align: center; }

        .title h1 {
            font-size: 30px;
            font-weight: 900;
            letter-spacing: -0.03em;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #ffffff, #93c5fd, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title p {
            font-size: 13px;
            color: #7e93b6;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        /* ── Tagline chip ── */
        .tagline {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 999px;
            background: rgba(59,130,246,.1);
            border: 1px solid rgba(59,130,246,.25);
            color: #93c5fd;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .tagline-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #22d3ee;
            animation: blink 1.4s ease-in-out infinite;
        }

        @keyframes blink {
            0%,100% { opacity:1; }
            50%      { opacity:.3; }
        }

        /* ── Spinner ── */
        .spinner-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .ring {
            width: 48px;
            height: 48px;
        }

        .ring svg {
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
        }

        .ring .track {
            fill: none;
            stroke: rgba(255,255,255,.07);
            stroke-width: 3.5;
        }

        .ring .fill {
            fill: none;
            stroke-width: 3.5;
            stroke-linecap: round;
            stroke-dasharray: 120;
            stroke-dashoffset: 35;
            stroke: url(#spinGrad);
            filter: drop-shadow(0 0 5px rgba(59,130,246,.8));
        }

        /* ── Dots ── */
        .dots {
            display: flex;
            gap: 6px;
        }

        .dots span {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #3b82f6;
            animation: bdot 0.9s ease-in-out infinite;
        }

        .dots span:nth-child(2) { animation-delay: .15s; }
        .dots span:nth-child(3) { animation-delay: .30s; }

        @keyframes bdot {
            0%,80%,100% { transform:translateY(0); opacity:.3; }
            40%          { transform:translateY(-7px); opacity:1; }
        }

        /* ── Loading text ── */
        .loading-text {
            font-size: 12px;
            color: #7e93b6;
            font-weight: 600;
            letter-spacing: 0.06em;
        }

        /* ── Progress bar ── */
        .progress-wrap {
            width: 160px;
            height: 2px;
            background: rgba(255,255,255,.07);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #22d3ee);
            border-radius: 99px;
            box-shadow: 0 0 8px rgba(59,130,246,.6);
            animation: progressAnim 2.5s ease-out forwards;
        }

        @keyframes progressAnim {
            0%   { width: 0%; }
            40%  { width: 55%; }
            80%  { width: 85%; }
            100% { width: 95%; }
        }

        /* ── Version badge ── */
        .version {
            position: fixed;
            bottom: 24px;
            font-size: 11px;
            color: rgba(255,255,255,.2);
            letter-spacing: 0.06em;
        }

        /* Safe area iOS */
        @supports (padding: max(0px)) {
            body {
                padding-bottom: max(0px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>

    <!-- SVG Gradients -->
    <svg width="0" height="0" style="position:absolute;pointer-events:none">
        <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%"   stop-color="#3b82f6"/>
                <stop offset="100%" stop-color="#22d3ee"/>
            </linearGradient>
            <linearGradient id="spinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%"   stop-color="#3b82f6"/>
                <stop offset="100%" stop-color="#22d3ee"/>
            </linearGradient>
        </defs>
    </svg>

    <!-- Splash -->
    <div class="splash">

        <!-- Logo + rotating ring -->
        <div class="logo-wrap">
            <div class="logo-ring">
                <svg viewBox="0 0 126 126">
                    <circle class="r-track" cx="63" cy="63" r="60"/>
                    <circle class="r-fill"  cx="63" cy="63" r="60"
                            stroke="url(#ringGrad)"/>
                </svg>
            </div>
            <div class="logo">TA</div>
        </div>

        <!-- App name -->
        <div class="title">
            <h1>APS Trading</h1>
            <p>AI Trading Command Center</p>
        </div>

        <!-- Live chip -->
        <div class="tagline">
            <div class="tagline-dot"></div>
            กำลังเชื่อมต่อระบบ AI
        </div>

        <!-- Spinner + dots -->
        <div class="spinner-wrap">
            <div class="ring">
                <svg viewBox="0 0 48 48">
                    <circle class="track" cx="24" cy="24" r="19"/>
                    <circle class="fill"  cx="24" cy="24" r="19"
                            stroke="url(#spinGrad)"/>
                </svg>
            </div>
            <div class="dots">
                <span></span><span></span><span></span>
            </div>
            <div class="loading-text" id="loadingText">กำลังเข้าสู่ระบบ...</div>
        </div>

        <!-- Progress -->
        <div class="progress-wrap">
            <div class="progress-bar"></div>
        </div>

    </div>

    <!-- Version -->
    <div class="version">APS Trading v2.0</div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwOvl1P1rv5jwfn5Cq0nRIOxOFCSocTRf7J5gdzVCK9_6f51yWGTWRzcwl8suoMAaQ77A/exec';

        // เปลี่ยนข้อความระหว่างรอ
        const messages = [
            'กำลังเข้าสู่ระบบ...',
            'กำลังโหลด AI Models...',
            'กำลังเชื่อมต่อ Backend...',
            'เกือบเสร็จแล้ว...'
        ];

        let msgIndex = 0;
        const textEl = document.getElementById('loadingText');

        const msgTimer = setInterval(function () {
            msgIndex = (msgIndex + 1) % messages.length;
            textEl.style.opacity = '0';
            setTimeout(function () {
                textEl.textContent = messages[msgIndex];
                textEl.style.opacity = '1';
            }, 200);
        }, 600);

        textEl.style.transition = 'opacity 0.2s ease';

        // Redirect หลัง 2.5 วิ
        setTimeout(function () {
            clearInterval(msgTimer);
            window.location.href = GAS_URL;
        }, 2500);
    </script>

</body>
</html>
