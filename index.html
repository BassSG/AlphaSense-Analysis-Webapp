    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-title" content="APS Trading">
    <meta name="theme-color" content="#08111f">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            width: 100%;
            background: linear-gradient(180deg, #07101d 0%, #0b1524 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .splash {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo {
            width: 100px;
            height: 100px;
            border-radius: 28px;
            background: linear-gradient(135deg, #3b82f6, #22d3ee);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 900;
            color: #fff;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 20px 60px rgba(59,130,246,.5);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 20px 60px rgba(59,130,246,.4); }
            50%       { box-shadow: 0 20px 80px rgba(59,130,246,.7),
                                    0 0 100px rgba(34,211,238,.3); }
        }

        /* Title */
        .title {
            text-align: center;
        }

        .title h1 {
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }

        .title p {
            font-size: 13px;
            color: #7e93b6;
        }

        /* Spinner */
        .ring {
            width: 52px;
            height: 52px;
        }

        .ring svg {
            width: 52px;
            height: 52px;
            animation: spin 1.1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .ring .track {
            fill: none;
            stroke: rgba(255,255,255,.08);
            stroke-width: 4;
        }

        .ring .fill {
            fill: none;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 130;
            stroke-dashoffset: 38;
            stroke: url(#g);
            filter: drop-shadow(0 0 6px rgba(59,130,246,.8));
        }

        /* Dots */
        .dots {
            display: flex;
            gap: 7px;
        }

        .dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #3b82f6;
            animation: bdot 0.9s ease-in-out infinite;
        }

        .dots span:nth-child(2) { animation-delay: .15s; }
        .dots span:nth-child(3) { animation-delay: .30s; }

        @keyframes bdot {
            0%, 80%, 100% { transform: translateY(0); opacity: .3; }
            40%            { transform: translateY(-8px); opacity: 1; }
        }

        /* กำลังโหลด text */
        .loading-text {
            font-size: 13px;
            color: #7e93b6;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position:absolute">
        <defs>
            <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%"   stop-color="#3b82f6"/>
                <stop offset="100%" stop-color="#22d3ee"/>
            </linearGradient>
        </defs>
    </svg>

    <div class="splash">
        <div class="logo">TA</div>

        <div class="title">
            <h1>APS Trading</h1>
            <p>AI Trading Command Center</p>
        </div>

        <div class="ring">
            <svg viewBox="0 0 52 52">
                <circle class="track" cx="26" cy="26" r="21"/>
                <circle class="fill"  cx="26" cy="26" r="21" stroke="url(#g)"/>
            </svg>
        </div>

        <div class="dots">
            <span></span><span></span><span></span>
        </div>

        <div class="loading-text">กำลังเข้าสู่ระบบ...</div>
    </div>

    <script>
        // แสดง splash 2.5 วินาที แล้ว redirect ไป GAS เลย
        // ไม่ต้องรอ iframe ไม่มีปัญหา load event
        setTimeout(function () {
            window.location.href = 
                'https://script.google.com/macros/s/AKfycbzZzuMx5XS-8IsmfL_rkf3Q_c1-ZKqmNA1APqC_AzL5Ig2rd71j7bGIN3QnDXTrx7RCCw/exec';
        }, 2500);
    </script>

</body>
</html>
