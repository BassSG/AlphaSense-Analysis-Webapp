<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, maximum-scale=1.0, user-scalable=no">
    <base target="_top">
    <title>APS Trading</title>

    <link rel="icon" type="image/webp" href="https://s21-kling.klingai.com/kimg/EMXN1y8qeAoGdXBsb2FkEg55bGFiLXN0dW50LXNncBpec2UvYWlfcG9ydGFsX3NncF9tbXVfaW1nMmltZ19haXdlYl92MTVfcG9ydHJhaXQvZjU4NDhmMzQtNjJiYi00OWNiLTljOGEtZmM1M2Y1OGU3OTUyX2ltYWdlLnBuZw:360x360.webp?x-kcdn-pid=112372">
    <link rel="apple-touch-icon" href="https://s21-kling.klingai.com/kimg/EMXN1y8qeAoGdXBsb2FkEg55bGFiLXN0dW50LXNncBpec2UvYWlfcG9ydGFsX3NncF9tbXVfaW1nMmltZ19haXdlYl92MTVfcG9ydHJhaXQvZjU4NDhmMzQtNjJiYi00OWNiLTljOGEtZmM1M2Y1OGU3OTUyX2ltYWdlLnBuZw:360x360.webp?x-kcdn-pid=112372">
    <link rel="manifest" href="manifest.json?v=3.3">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="APS Trading">
    <meta name="theme-color" content="#0b1220">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b1220;
            font-family: "Segoe UI", "Prompt", "Noto Sans Thai", sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #app-shell {
            position: fixed;
            inset: 0;
            z-index: 1;
            overflow: hidden;
        }

        #app-container {
            width: 100%;
            height: 100%;
            border: 0;
            background: #0b1220;
        }

        .app-splash {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at 18% 20%, rgba(66, 133, 244, 0.25), transparent 44%),
                radial-gradient(circle at 80% 82%, rgba(76, 211, 255, 0.18), transparent 40%),
                linear-gradient(160deg, #081228 0%, #0d1934 54%, #0b152b 100%);
            transition: opacity 0.45s ease;
        }

        .splash-card {
            width: min(90vw, 420px);
            border-radius: 24px;
            border: 1px solid rgba(151, 178, 230, 0.3);
            background: rgba(10, 18, 34, 0.62);
            padding: 20px;
            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.42);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .splash-logo {
            width: 82px;
            height: 82px;
            border-radius: 20px;
            margin: 0 auto 14px;
            display: block;
            box-shadow: 0 12px 30px rgba(66, 133, 244, 0.35);
        }

        .splash-title {
            color: #edf3ff;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .splash-sub {
            color: #9eb3d9;
            font-size: 12px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .splash-status {
            color: #c2d6ff;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .bar {
            width: 100%;
            height: 7px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.1);
            overflow: hidden;
            margin-bottom: 12px;
        }

        .bar-fill {
            width: 0;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #4285f4, #60d6ff);
            transition: width 0.3s ease;
        }

        .splash-hint {
            color: #8ea7d6;
            font-size: 12px;
            min-height: 18px;
        }

        .fallback {
            margin-top: 14px;
            display: none;
        }

        .fallback button {
            border: 1px solid rgba(140, 190, 255, 0.35);
            background: rgba(66, 133, 244, 0.2);
            color: #e8f0ff;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .version {
            position: fixed;
            left: 50%;
            bottom: 12px;
            transform: translateX(-50%);
            color: rgba(188, 203, 232, 0.5);
            font-size: 11px;
            z-index: 10000;
            letter-spacing: 0.04em;
        }

        @supports (padding: max(0px)) {
            body {
                padding-top: max(0px, env(safe-area-inset-top));
                padding-bottom: max(0px, env(safe-area-inset-bottom));
                padding-left: max(0px, env(safe-area-inset-left));
                padding-right: max(0px, env(safe-area-inset-right));
            }
        }
    </style>
</head>
<body>
    <div class="app-splash" id="splash-screen">
        <div class="splash-card">
            <img class="splash-logo" src="https://s21-kling.klingai.com/kimg/EMXN1y8qeAoGdXBsb2FkEg55bGFiLXN0dW50LXNncBpec2UvYWlfcG9ydGFsX3NncF9tbXVfaW1nMmltZ19haXdlYl92MTVfcG9ydHJhaXQvZjU4NDhmMzQtNjJiYi00OWNiLTljOGEtZmM1M2Y1OGU3OTUyX2ltYWdlLnBuZw:360x360.webp?x-kcdn-pid=112372" alt="APS Trading">
            <h1 class="splash-title">APS Trading</h1>
            <p class="splash-sub">Internal Web Application</p>
            <p class="splash-status" id="splashStatus">กำลังเชื่อมต่อระบบ...</p>
            <div class="bar"><div class="bar-fill" id="barFill"></div></div>
            <p class="splash-hint" id="splashHint">กำลังเริ่มต้นโมดูลหลัก</p>
            <div class="fallback" id="fallbackPanel">
                <button type="button" id="openDirectBtn">เปิดแอปโดยตรง</button>
            </div>
        </div>
    </div>

    <div id="app-shell">
        <iframe id="app-container" title="APS Trading App"></iframe>
    </div>

    <div class="version">APS Trading v3.3</div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxID3vu9GS3u8VbylhD8891EGLe8QLUjFFqyIn0iDwSneMl8Yc3UVjiAPJuoUYtIStF/exec';

        const iframe = document.getElementById('app-container');
        const splash = document.getElementById('splash-screen');
        const barFill = document.getElementById('barFill');
        const splashStatus = document.getElementById('splashStatus');
        const splashHint = document.getElementById('splashHint');
        const fallbackPanel = document.getElementById('fallbackPanel');
        const openDirectBtn = document.getElementById('openDirectBtn');

        let splashHidden = false;
        let progress = 0;

        function hideSplash() {
            if (splashHidden) return;
            splashHidden = true;
            splash.style.opacity = '0';
            setTimeout(function () {
                splash.style.display = 'none';
            }, 460);
        }

        function setProgress(nextValue, statusText, hintText) {
            progress = Math.max(progress, nextValue);
            barFill.style.width = progress + '%';
            if (statusText) splashStatus.textContent = statusText;
            if (hintText) splashHint.textContent = hintText;
        }

        const timeline = [
            { at: 200, p: 20, s: 'กำลังโหลดระบบภายใน...', h: 'เตรียมหน้าแอป' },
            { at: 900, p: 45, s: 'กำลังเชื่อมต่อบริการ...', h: 'กำลังเปิดเซสชัน' },
            { at: 1800, p: 72, s: 'กำลังซิงก์ข้อมูล...', h: 'รอการตอบกลับจากระบบ' }
        ];

        timeline.forEach(function (step) {
            setTimeout(function () {
                setProgress(step.p, step.s, step.h);
            }, step.at);
        });

        iframe.addEventListener('load', function () {
            setProgress(100, 'เชื่อมต่อสำเร็จ', 'ระบบพร้อมใช้งาน');
            setTimeout(hideSplash, 250);
        });

        openDirectBtn.addEventListener('click', function () {
            window.open(GAS_URL, '_blank', 'noopener,noreferrer');
        });

        setTimeout(function () {
            if (splashHidden) return;
            setProgress(90, 'การเชื่อมต่อช้ากว่าปกติ', 'คุณยังรอต่อได้ หรือเปิดตรง');
            fallbackPanel.style.display = 'block';
        }, 7000);

        setTimeout(function () {
            if (splashHidden) return;
            setProgress(100, 'ระบบพร้อมในโหมดพรีวิว', 'ซ่อนหน้ารอและแสดงแอป');
            hideSplash();
        }, 12000);

        iframe.src = GAS_URL;

        document.body.addEventListener('touchmove', function (e) {
            if (e.target.id !== 'app-container') {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
